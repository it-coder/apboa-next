name: Sync and Push Image to Aliyun ACR

on:
  workflow_dispatch:  # 通过 GitHub 界面手动触发，方便测试
  inputs:
      image_list:
        description: '需要同步的镜像列表（每行一个）'
        required: true
        default: |
          pgvector/pgvector:pg16
          
  # push:
  #   branches: [ "main" ] # 也可以配置为在 main 分支推送时自动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 登录到阿里云 ACR
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 2. 拉取源镜像并推送到 ACR
      - name: Pull and Push Image
        run: |
          # 定义源镜像地址，例如：nginx:latest 或 mysql:8.0
          SOURCE_IMAGE="eclipse-temurin:21-jre"
          
          # 定义目标镜像地址
          TARGET_IMAGE="${{ secrets.ALIYUN_REGISTRY }}/lih_hub/$SOURCE_IMAGE"
          
          # 从 Docker Hub 或其他源拉取镜像
          echo "Pulling source image: $SOURCE_IMAGE"
          docker pull $SOURCE_IMAGE
          
          # 为镜像打上 ACR 的标签
          echo "Tagging as: $TARGET_IMAGE"
          docker tag $SOURCE_IMAGE $TARGET_IMAGE
          
          # 推送到阿里云 ACR
          echo "Pushing to Aliyun ACR..."
          docker push $TARGET_IMAGE
          
          echo "Sync completed successfully!"
